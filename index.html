<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Physics Lab — Simple Pendulum</title>
  <meta name="description" content="Simple Pendulum lab calculator with graph paper, uncertainty analysis and PDF report.">
  <meta name="theme-color" content="#0a0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pendulum Lab">
  <link rel="apple-touch-icon" href="https://placehold.co/192x192/06b6d4/ffffff?text=g">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --blue: #4a7fb5;
      --text: #2c3e50;
      --sans: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; }
    #generate-pdf {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      padding: 10px 15px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-family: var(--sans);
      font-weight: 500;
    }
    #generate-pdf:hover { background: #6b9fd4; }
    #pdf-status {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      padding: 10px 15px;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      border-radius: 5px;
      display: none;
      font-family: var(--sans);
    }
    .spinner {
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 3px solid white;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      display: inline-block;
      margin-right: 10px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <button id="generate-pdf">Generate PDF Report</button>
  <div id="pdf-status"></div>

  <!-- Your existing React app scripts -->
  <script type="text/babel">
    // Your existing React code here
  </script>

  <!-- PDF Generation Script -->
  <script>
    document.getElementById('generate-pdf').addEventListener('click', async () => {
      const statusEl = document.getElementById('pdf-status');
      statusEl.style.display = 'block';
      statusEl.innerHTML = '<span class="spinner"></span> Generating PDF...';

      try {
        // Replace this URL with your Puppeteer API endpoint
        const apiUrl = 'https://your-puppeteer-api-url.onrender.com/generate-pdf';
        const response = await fetch(apiUrl);

        if (!response.ok) throw new Error('Failed to generate PDF');

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'pendulum-lab-report.pdf';
        a.click();
        window.URL.revokeObjectURL(url);

        statusEl.innerHTML = 'PDF generated successfully!';
        setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
      } catch (error) {
        console.error('Error:', error);
        statusEl.innerHTML = 'Error generating PDF. Please try again.';
        setTimeout(() => { statusEl.style.display = 'none'; }, 3000);
      }
    });
  </script>
</body>
</html>
