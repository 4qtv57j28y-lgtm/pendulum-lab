<!DOCTYPE html>
<html lang="en-GB">
<head>

<style>
/* ── PROFESSIONAL PASTEL THEME ──────────────────────────────────── */
:root {
  --bg:       #f0f4f8;
  --bg2:      #e8eef5;
  --card:     #ffffff;
  --card2:    #f7f9fc;
  --border:   #dce6f0;
  --border2:  #c8d8ea;
  --blue:     #4a7fb5;
  --blue-dim: #6b9fd4;
  --blue-lt:  #e8f0f9;
  --teal:     #3a9e8f;
  --teal-lt:  #e6f6f4;
  --amber:    #c8882a;
  --amber-lt: #fdf3e3;
  --green:    #3a9e6a;
  --green-lt: #e6f6ee;
  --red:      #c84040;
  --red-lt:   #fce8e8;
  --purple:   #7a5fb5;
  --purple-lt:#f0ecf9;
  --text:     #2c3e50;
  --text-mid: #5a7a96;
  --text-dim: #8fa8bf;
  --mono:     'JetBrains Mono', monospace;
  --sans:     'Inter', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
.mono, code { font-family: var(--mono); }

@media print {
  body { background: white !important; height: auto !important; overflow: visible !important; color: #0f172a !important; }
  .no-print { display: none !important; }
  @page { margin: 15mm; size: A4 portrait; }
  #print-report { display: block !important; }
  #app-shell { display: none !important; }
}
@media screen { #print-report { display: none; } }

#app-shell { display: flex; flex-direction: column; height: 100vh; }

.top-bar {
  background: linear-gradient(90deg, #3a6b9e 0%, #4a7fb5 100%);
  color: white; padding: 10px 18px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0; border-bottom: 1px solid #2d5a8a;
  box-shadow: 0 2px 8px rgba(74,127,181,0.25);
}
.top-bar-logo {
  width: 34px; height: 34px;
  background: rgba(255,255,255,0.2);
  border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; color: white;
  font-family: var(--mono);
}
.top-bar-title { font-size: 14px; font-weight: 700; letter-spacing: 0.03em; color: white; }
.top-bar-sub { font-size: 10px; color: rgba(255,255,255,0.7); margin-left: auto; }

.tab-bar {
  background: white; border-bottom: 1px solid var(--border);
  padding: 0 12px; display: flex; gap: 2px;
  flex-shrink: 0; overflow-x: auto;
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.tab-btn {
  padding: 11px 16px; font-size: 11px; font-weight: 600;
  color: var(--text-mid); border: none; background: none;
  cursor: pointer; border-bottom: 2px solid transparent;
  white-space: nowrap; transition: all 0.15s; letter-spacing: 0.02em;
}
.tab-btn:hover { color: var(--blue); background: var(--blue-lt); }
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); background: var(--blue-lt); }

.tab-content { flex: 1; overflow: hidden; display: none; }
.tab-content.active { display: flex; flex-direction: column; }
.scroll-area { flex: 1; overflow-y: auto; padding: 14px; background: var(--bg); }

.card {
  background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden; margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(74,127,181,0.08);
}
.card-header {
  padding: 10px 14px; background: var(--card2);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.card-title { font-size: 11px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.07em; }
.card-body { padding: 14px; }

.btn {
  padding: 8px 16px; border-radius: 7px; font-size: 12px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s;
  display: inline-flex; align-items: center; gap: 6px; font-family: var(--sans);
}
.btn-primary { background: var(--blue); color: white; }
.btn-primary:hover { background: #3a6b9e; box-shadow: 0 2px 8px rgba(74,127,181,0.35); }
.btn-outline { background: white; color: var(--blue); border: 1.5px solid var(--blue); }
.btn-outline:hover { background: var(--blue-lt); }
.btn-green { background: var(--green); color: white; }
.btn-sm { padding: 4px 10px; font-size: 10px; }
.btn-danger { background: var(--red-lt); color: var(--red); border: 1px solid #f0b8b8; }

.data-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.data-table th {
  background: linear-gradient(180deg, #e8f0f9 0%, #dce8f5 100%);
  font-weight: 700; text-transform: uppercase; font-size: 9px;
  letter-spacing: 0.06em; color: var(--blue);
  padding: 7px 5px; border: 1px solid var(--border); text-align: center;
}
.data-table td { padding: 4px 3px; border: 1px solid var(--border); text-align: center; vertical-align: middle; background: white; }
.data-table tr:hover td { background: var(--blue-lt); }
.cell-input {
  width: 68px; padding: 4px 5px;
  border: 1px solid var(--border2); border-radius: 4px;
  text-align: center; font-family: var(--mono); font-size: 11px; outline: none;
  background: white; color: var(--text);
}
.cell-input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(74,127,181,0.15); }
.cell-calc { font-family: var(--mono); font-size: 11px; font-weight: 600; }
.anomaly-btn { width: 18px; height: 18px; border-radius: 50%; border: none; cursor: pointer; font-size: 10px; font-weight: 700; }

.graph-container {
  background: var(--bg2); padding: 10px;
  display: flex; align-items: center; justify-content: center; overflow: auto;
  border-top: 1px solid var(--border);
}

.scale-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 7px; }
.scale-label { font-size: 10px; font-weight: 700; color: var(--blue); width: 46px; font-family: var(--mono); }
.scale-input {
  width: 65px; padding: 4px 7px;
  border: 1px solid var(--border2); border-radius: 5px;
  font-size: 11px; text-align: center; outline: none;
  background: white; color: var(--text); font-family: var(--mono);
}
.scale-input:focus { border-color: var(--blue); }
.scale-select {
  padding: 4px 7px; border: 1px solid var(--border2); border-radius: 5px;
  font-size: 11px; outline: none; background: white; color: var(--text);
}

.calc-box { border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; text-align: center; }
.calc-box-blue   { background: var(--blue-lt);   border: 1px solid #b8d0ea; }
.calc-box-green  { background: var(--green-lt);  border: 1px solid #a8d8bc; }
.calc-box-purple { background: var(--purple-lt); border: 1px solid #c8b8e8; }
.calc-box-amber  { background: var(--amber-lt);  border: 1px solid #e8c888; }
.calc-box-red    { background: var(--red-lt);    border: 1px solid #e8a8a8; }
.calc-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; color: var(--text-mid); }
.calc-result { font-size: 18px; font-weight: 700; margin-top: 8px; font-family: var(--mono); }

.verdict { border-radius: 8px; padding: 12px; text-align: center; font-weight: 700; font-size: 13px; margin-top: 10px; }
.verdict-pass { background: var(--green-lt); border: 2px solid #5ab87a; color: #2a7a4a; }
.verdict-fail  { background: var(--red-lt);   border: 2px solid #d06060; color: var(--red); }

.angle-warning {
  background: var(--amber-lt); border: 1px solid #e8c888;
  border-radius: 7px; padding: 9px 12px; font-size: 11px; color: var(--amber);
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px;
}

.ext-table { width: 100%; border-collapse: collapse; font-size: 11px; }
.ext-table th {
  background: linear-gradient(180deg, #e8f0f9 0%, #dce8f5 100%);
  color: var(--blue); padding: 7px 5px; font-size: 9px;
  text-transform: uppercase; letter-spacing: 0.06em;
  border: 1px solid var(--border); text-align: center;
}
.ext-table td { padding: 5px 3px; border: 1px solid var(--border); text-align: center; font-family: var(--mono); font-size: 11px; background: white; }
.ext-table tr:nth-child(even) td { background: var(--bg2); }
.ext-danger td { background: var(--red-lt) !important; color: var(--red); }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
@media (max-width: 768px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--blue-dim); }

.katex { color: var(--text) !important; }
</style>
</head>
<body>

<div id="app-shell" class="no-print"></div>

<!-- PRINT REPORT (hidden on screen, shown on print) -->
<div id="print-report">
  <div id="print-content"></div>
</div>

<script type="text/babel">
const { useState, useRef, useMemo, useEffect, useCallback } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const G_STD = 9.80665;
const MARGIN = { top: 65, right: 25, bottom: 55, left: 58 };
const MAJOR_PX = 50;
const MINOR_PX = 10;
const SCALES = [0.01,0.02,0.05,0.1,0.2,0.5,1,2,5,10,20,50];

// ─── KATEX COMPONENT ─────────────────────────────────────────────────────────
function Eq({ m, block = false }) {
  const ref = useRef(null);
  useEffect(() => {
    if (window.katex && ref.current) {
      window.katex.render(m, ref.current, { throwOnError: false, displayMode: block });
    }
  }, [m, block]);
  return <span ref={ref} className={block ? "block text-center my-2" : "inline-block"} />;
}

// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────
const DEFAULT_DATA = [
  { id:1, l:"1.000", trials:[{v:"20.05",ok:true},{v:"20.08",ok:true},{v:"20.02",ok:true}] },
  { id:2, l:"0.900", trials:[{v:"19.08",ok:true},{v:"19.03",ok:true},{v:"18.99",ok:true}] },
  { id:3, l:"0.800", trials:[{v:"17.92",ok:true},{v:"17.96",ok:true},{v:"17.90",ok:true}] },
  { id:4, l:"0.700", trials:[{v:"16.78",ok:true},{v:"16.82",ok:true},{v:"16.75",ok:true}] },
  { id:5, l:"0.600", trials:[{v:"15.50",ok:true},{v:"15.55",ok:true},{v:"15.52",ok:true}] },
  { id:6, l:"0.500", trials:[{v:"14.19",ok:true},{v:"14.22",ok:true},{v:"14.15",ok:true}] },
  { id:7, l:"0.400", trials:[{v:"12.65",ok:true},{v:"12.70",ok:true},{v:"12.68",ok:true}] },
];

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab] = useState('table');
  const [N, setN] = useState(10);
  const [data, setData] = useState(DEFAULT_DATA);
  const [scales, setScales] = useState({ xMin:0.3, xStep:0.1, xEnd:1.1, yMin:1.0, yStep:0.5, yEnd:5.0 });
  const [tri, setTri] = useState({ p1:{x:0.4,y:1.6}, p2:{x:1.0,y:4.0} });
  const [drag, setDrag] = useState(null);
  const svgRef = useRef(null);

  // Extension state
  const [extData, setExtData] = useState([
    { id:1, angle:"10", trials:[{v:"20.12",ok:true},{v:"20.09",ok:true},{v:"20.14",ok:true}] },
    { id:2, angle:"20", trials:[{v:"20.18",ok:true},{v:"20.15",ok:true},{v:"20.20",ok:true}] },
    { id:3, angle:"30", trials:[{v:"20.35",ok:true},{v:"20.32",ok:true},{v:"20.38",ok:true}] },
    { id:4, angle:"45", trials:[{v:"20.65",ok:true},{v:"20.61",ok:true},{v:"20.68",ok:true}] },
    { id:5, angle:"60", trials:[{v:"21.05",ok:true},{v:"21.01",ok:true},{v:"21.08",ok:true}] },
  ]);
  const [extL, setExtL] = useState("1.000");
  const [extN, setExtN] = useState(10);
  const [extScales, setExtScales] = useState({ xMin:0, xStep:10, xEnd:70, yMin:0.5, yStep:0.5, yEnd:5.0 });
  const [extTri, setExtTri] = useState({ p1:{x:10,y:1.0}, p2:{x:60,y:4.5} });
  const extSvgRef = useRef(null);

  // OCR state
  const [imgSrc, setImgSrc] = useState(null);
  const [imgBase64, setImgBase64] = useState(null);
  const [imgMime, setImgMime] = useState('image/jpeg');
  const [ocrStatus, setOcrStatus] = useState('idle'); // idle | processing | done | error
  const [ocrPreview, setOcrPreview] = useState(null);
  const [ocrMsg, setOcrMsg] = useState('');
  // ⚙️  DEPLOYMENT: replace the empty string below with your Anthropic API key
  //    Teachers will never see the key input field.
  const BAKED_KEY = 'sk-ant-api03-QX-gnBcJtTtykF98Q_2o4I2nUY8En5S5MgOLHb-gp4JEwykgOAQVF4ZhNm6mN0otRK20tGtxmMyCi9cxi-VFAQ-V9U1LwAA'; // <-- paste your sk-ant-api03-... key here before deploying
  const [apiKey, setApiKey] = useState(localStorage.getItem('anthropic_key') || BAKED_KEY);

  // ── PROCESSED DATA ──
  const plotData = useMemo(() => data.map(d => {
    const valid = d.trials.filter(t => t.ok && t.v !== '' && !isNaN(parseFloat(t.v))).map(t => parseFloat(t.v));
    const L = parseFloat(d.l);
    if (!valid.length || isNaN(L)) return { ...d, ok: false };
    const tAvg = valid.reduce((a,b)=>a+b,0)/valid.length;
    const T = tAvg / N;
    const T2 = T*T;
    const range = Math.max(...valid) - Math.min(...valid);
    return { ...d, L, tAvg, T, T2, range, ok: true };
  }).filter(d=>d.ok), [data, N]);

  const regression = useMemo(() => {
    if (plotData.length < 2) return null;
    let sx=0,sy=0,sxy=0,sxx=0; const n=plotData.length;
    plotData.forEach(d=>{sx+=d.L;sy+=d.T2;sxy+=d.L*d.T2;sxx+=d.L*d.L;});
    const m=(n*sxy-sx*sy)/(n*sxx-sx*sx);
    const b=(sy-m*sx)/n;
    return {m,b};
  }, [plotData]);

  useEffect(() => {
    if (regression) setTri(p=>({
      p1:{x:p.p1.x, y:regression.m*p.p1.x+regression.b},
      p2:{x:p.p2.x, y:regression.m*p.p2.x+regression.b}
    }));
  }, [regression]);

  const dY = tri.p2.y - tri.p1.y;
  const dX = tri.p2.x - tri.p1.x;
  const grad = dX !== 0 ? dY/dX : 0;
  const gCalc = grad > 0 ? (4*Math.PI*Math.PI)/grad : 0;

  const unc = useMemo(() => {
    if (!plotData.length || grad <= 0) return null;
    const worst = plotData.reduce((a,b)=>a.range>b.range?a:b);
    if (!worst.range || !worst.T || !worst.L) return null;
    const uT = (0.5*worst.range/(N*worst.T))*100;
    const uL = (0.001/worst.L)*100;
    const ug = 2*uT + uL;
    const dg = gCalc*(ug/100);
    const pdiff = Math.abs(gCalc-G_STD)/G_STD*100;
    return {worst, uT, uL, ug, dg, pdiff};
  }, [plotData, N, gCalc, grad]);

  // ── EXTENSION PROCESSED ──
  const extPlot = useMemo(() => extData.map(d => {
    const valid = d.trials.filter(t=>t.ok && t.v!=='' && !isNaN(parseFloat(t.v))).map(t=>parseFloat(t.v));
    const ang = parseFloat(d.angle);
    const L = parseFloat(extL);
    if (!valid.length || isNaN(ang) || isNaN(L)) return {...d, ok:false};
    const tAvg = valid.reduce((a,b)=>a+b,0)/valid.length;
    const T = tAvg/extN;
    const T2 = T*T;
    const g = (4*Math.PI*Math.PI*L)/T2;
    const pdiff = Math.abs(g-G_STD)/G_STD*100;
    return {...d, ang, tAvg, T, T2, g, pdiff, ok:true};
  }).filter(d=>d.ok), [extData, extL, extN]);

  const extReg = useMemo(() => {
    if (extPlot.length < 2) return null;
    let sx=0,sy=0,sxy=0,sxx=0; const n=extPlot.length;
    extPlot.forEach(d=>{sx+=d.ang;sy+=d.T2;sxy+=d.ang*d.T2;sxx+=d.ang*d.ang;});
    const m=(n*sxy-sx*sy)/(n*sxx-sx*sx);
    const b=(sy-m*sx)/n;
    return {m,b};
  }, [extPlot]);

  useEffect(() => {
    if (extReg) setExtTri(p=>({
      p1:{x:p.p1.x, y:extReg.m*p.p1.x+extReg.b},
      p2:{x:p.p2.x, y:extReg.m*p.p2.x+extReg.b}
    }));
  }, [extReg]);

  // ── GRAPH HELPERS ──
  const numX = Math.max(1, Math.ceil((scales.xEnd-scales.xMin)/scales.xStep));
  const numY = Math.max(1, Math.ceil((scales.yEnd-scales.yMin)/scales.yStep));
  const GW = numX*MAJOR_PX, GH = numY*MAJOR_PX;
  const SW = GW+MARGIN.left+MARGIN.right, SH = GH+MARGIN.top+MARGIN.bottom;
  const mX = x => MARGIN.left+((x-scales.xMin)/scales.xStep)*MAJOR_PX;
  const mY = y => SH-MARGIN.bottom-((y-scales.yMin)/scales.yStep)*MAJOR_PX;
  const umX = px => scales.xMin+((px-MARGIN.left)/MAJOR_PX)*scales.xStep;
  const umY = py => scales.yMin+((SH-MARGIN.bottom-py)/MAJOR_PX)*scales.yStep;

  const extNumX = Math.max(1, Math.ceil((extScales.xEnd-extScales.xMin)/extScales.xStep));
  const extNumY = Math.max(1, Math.ceil((extScales.yEnd-extScales.yMin)/extScales.yStep));
  const EGW = extNumX*MAJOR_PX, EGH = extNumY*MAJOR_PX;
  const ESW = EGW+MARGIN.left+MARGIN.right, ESH = EGH+MARGIN.top+MARGIN.bottom;
  const emX = x => MARGIN.left+((x-extScales.xMin)/extScales.xStep)*MAJOR_PX;
  const emY = y => ESH-MARGIN.bottom-((y-extScales.yMin)/extScales.yStep)*MAJOR_PX;

  // ── DRAG HANDLERS ──
  const onDown = (id,e) => { setDrag(id); e.target.setPointerCapture(e.pointerId); };
  const onMove = (e, isExt=false) => {
    if (!drag) return;
    const svg = isExt ? extSvgRef.current : svgRef.current;
    if (!svg) return;
    const pt = svg.createSVGPoint(); pt.x=e.clientX; pt.y=e.clientY;
    const cur = pt.matrixTransform(svg.getScreenCTM().inverse());
    let nx = isExt ? (extScales.xMin+((cur.x-MARGIN.left)/MAJOR_PX)*extScales.xStep) : umX(cur.x);
    const reg = isExt ? extReg : regression;
    const sc = isExt ? extScales : scales;
    const nXMax = sc.xMin + (isExt?extNumX:numX)*sc.xStep;
    const nYMax = sc.yMin + (isExt?extNumY:numY)*sc.yStep;
    nx = Math.max(sc.xMin, Math.min(nXMax, nx));
    let ny;
    if (reg) {
      ny = reg.m*nx+reg.b;
      if (ny>nYMax){ny=nYMax;nx=(ny-reg.b)/reg.m;}
      else if(ny<sc.yMin){ny=sc.yMin;nx=(ny-reg.b)/reg.m;}
    } else { ny = Math.max(sc.yMin, Math.min(nYMax, isExt?(extScales.yMin+((ESH-MARGIN.bottom-cur.y)/MAJOR_PX)*extScales.yStep):umY(cur.y))); }
    if (isExt) setExtTri(p=>({...p,[drag]:{x:nx,y:ny}}));
    else setTri(p=>({...p,[drag]:{x:nx,y:ny}}));
  };
  const onUp = e => { if(drag){e.target.releasePointerCapture(e.pointerId); setDrag(null);} };

  // ── DATA HANDLERS ──
  const setL = (id,v) => setData(d=>d.map(r=>r.id===id?{...r,l:v}:r));
  const blurL = id => setData(d=>d.map(r=>{ if(r.id!==id)return r; const n=parseFloat(r.l); return {...r,l:isNaN(n)?r.l:n.toFixed(3)}; }));
  const setT = (id,ti,v) => setData(d=>d.map(r=>{ if(r.id!==id)return r; const t=[...r.trials]; t[ti]={...t[ti],v}; return {...r,trials:t}; }));

    setOcrStatus('processing'); setOcrMsg('Sending image to Claude Vision...');
    try {

      const timeout = setTimeout(() => controller.abort(), 30000);
      let res;
      try {
        res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          signal: controller.signal,
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
            'anthropic-version': '2023-06-01',

              content: [

Return ONLY a raw JSON array — no explanation, no markdown, no backticks, nothing else.

Each object: {"l":"0.900","t1":"19.08","t2":"19.03","t3":"18.99"}

Rules:
- l = effective length in metres (e.g. 0.500, 0.900, 1.000)
- t1/t2/t3 = timing values in seconds as written
- If a trial is missing write null
- Extract every data row visible

Example output (return exactly this format):
[{"l":"1.000","t1":"20.05","t2":"20.08","t3":"20.02"},{"l":"0.900","t1":"19.08","t2":"19.03","t3":"18.99"}]` }
              ]
            }]
          })
        });
        clearTimeout(timeout);
      } catch(fetchErr) {
        clearTimeout(timeout);
        if (fetchErr.name === 'AbortError') throw new Error('Request timed out after 30s. Check your internet connection.');
        throw new Error(`Network error: ${fetchErr.message}. If opening from Files app, try hosting the app on a website instead.`);
      }
      if (!res.ok) {
        const err = await res.json().catch(()=>({}));
        if (res.status === 401) throw new Error('Invalid API key — check it is correct and try again.');
        if (res.status === 429) throw new Error('Rate limit reached — wait a moment and try again.');
        if (res.status === 400) throw new Error(`Bad request: ${err.error?.message || 'Unknown error'}`);
        throw new Error(`API ${res.status}: ${err.error?.message || JSON.stringify(err).slice(0,120)}`);
      }
      const json = await res.json();
      const rawText = json.content?.[0]?.text || '';
      
      // Debug: show first 200 chars if all parsing fails
      let parsed = null;
      try { parsed = JSON.parse(rawText.trim()); } catch(e) {}
      if (!parsed) { try { parsed = JSON.parse(rawText.replace(/```json|```/g,'').trim()); } catch(e) {} }
      if (!parsed) { const m = rawText.match(/\[[\s\S]*?\]/); if(m) try { parsed = JSON.parse(m[0]); } catch(e) {} }
      if (!parsed) { const m = rawText.match(/\[[\s\S]*\]/); if(m) try { parsed = JSON.parse(m[0]); } catch(e) {} }
      if (!parsed) {

      <li>Stand facing the plane of oscillation. Start stopwatch when bob passes the fiducial marker.</li>
      <li>Time N = ${N} complete oscillations (bob passes marker in same direction N times).</li>
      <li>Record time t. Repeat twice more (t₁, t₂, t₃). Calculate mean t̄ and period T = t̄ / N.</li>
      <li>Repeat for at least 6 values of L in the range 0.4 m – 1.0 m.</li>
      <li>Plot T² (y-axis) against L (x-axis). Draw line of best fit.</li>
      <li>Calculate gradient m using a large gradient triangle drawn on the graph.</li>
      <li>Determine g = 4π²/m. Evaluate uncertainty and compare with standard value.</li>
    </ol>

    <div class="page-break"></div>
    <h2>5. Results Table</h2>
    <table>
      <thead><tr><th>L (m)</th><th>t₁ (s)</th><th>t₂ (s)</th><th>t₃ (s)</th><th>Mean t̄ (s)</th><th>Period T (s)</th><th>T² (s²)</th></tr></thead>
      <tbody>
        ${plotData.map(d=>`<tr>
          <td>${d.L.toFixed(3)}</td>
          <td>${d.trials[0]?.v||'—'}</td>
          <td>${d.trials[1]?.v||'—'}</td>
          <td>${d.trials[2]?.v||'—'}</td>
          <td>${d.tAvg.toFixed(3)}</td>
          <td>${d.T.toFixed(3)}</td>
          <td><strong>${d.T2.toFixed(3)}</strong></td>
        </tr>`).join('')}
      </tbody>
    </table>

    <div class="page-break"></div>
    <h2>6. Graph — T² against L</h2>
    <div class="graph-box">${graphSVG}</div>

    <div class="page-break"></div>
    <h2>7. Gradient &amp; Calculation of g</h2>
    <div class="box box-blue">
      <strong>Gradient triangle:</strong><br/>
      ΔT² = ${tri.p2.y.toFixed(3)} − ${tri.p1.y.toFixed(3)} = ${(tri.p2.y-tri.p1.y).toFixed(3)} s²<br/>
      ΔL = ${tri.p2.x.toFixed(3)} − ${tri.p1.x.toFixed(3)} = ${(tri.p2.x-tri.p1.x).toFixed(3)} m<br/>
      <strong>m = ΔT² / ΔL = ${grad.toFixed(4)} s² m⁻¹</strong>
    </div>
    <div class="box box-green">
      <strong>g = 4π² / m = 4π² / ${grad.toFixed(4)} = ${gCalc.toFixed(2)} m s⁻²</strong>
    </div>

    <h2>8. Uncertainty Analysis</h2>
    <p><strong>Worst-case row selected:</strong> L = ${unc.worst.L.toFixed(3)} m, Range = ${unc.worst.range.toFixed(3)} s, T = ${unc.worst.T.toFixed(3)} s</p>
    <div class="formula">% u_T = (0.5 × ${unc.worst.range.toFixed(3)}) / (${N} × ${unc.worst.T.toFixed(3)}) × 100 = ${unc.uT.toFixed(3)} %</div>
    <div class="formula">% u_L = 0.001 / ${unc.worst.L.toFixed(3)} × 100 = ${unc.uL.toFixed(3)} %</div>
    <div class="formula">% u_g = 2 × % u_T + % u_L = 2 × ${unc.uT.toFixed(3)} + ${unc.uL.toFixed(3)} = ${unc.ug.toFixed(3)} %</div>
    <div class="formula">Δg = g × (% u_g / 100) = ${gCalc.toFixed(2)} × (${unc.ug.toFixed(3)} / 100) = ${unc.dg.toFixed(2)} m s⁻²</div>
    <div class="result">g = (${gCalc.toFixed(2)} ± ${unc.dg.toFixed(2)}) m s⁻²</div>

    <h2>9. Conclusion</h2>
    <div class="formula">% difference = |${gCalc.toFixed(3)} − 9.807| / 9.807 × 100 = ${unc.pdiff.toFixed(2)} %</div>
    <div class="${unc.pdiff<=unc.ug?'verdict-pass':'verdict-fail'}">
      Result is <strong>${unc.pdiff<=unc.ug?'CONSISTENT ✓':'INCONSISTENT ✗'}</strong> with the standard value g = 9.807 m s⁻²<br/>
      <span style="font-weight:400;font-size:10pt;">% difference (${unc.pdiff.toFixed(2)}%) is ${unc.pdiff<=unc.ug?'≤':'>'} % uncertainty (${unc.ug.toFixed(2)}%)</span>
    </div>

    <div class="page-break"></div>
    <h2>10. Extension — Large-Angle Breakdown of SHM</h2>
    <p>With L fixed at ${extL} m, the release angle θ was varied. For θ &gt; 15° the small-angle approximation sin θ ≈ θ breaks down; the period increases and the calculated g is systematically underestimated.</p>
    <table>
      <thead><tr><th>θ (°)</th><th>T (s)</th><th>T² (s²)</th><th>g (m s⁻²)</th><th>% diff from standard</th><th>SHM valid?</th></tr></thead>
      <tbody>
        ${extPlot.map(d=>`<tr>
          <td>${d.ang}°</td>
          <td>${d.T.toFixed(3)}</td>
          <td>${d.T2.toFixed(3)}</td>
          <td style="color:${d.g<9.5?'#dc2626':'#065f46'};font-weight:700;">${d.g.toFixed(2)}</td>
          <td>${d.pdiff.toFixed(1)}%</td>
          <td style="color:${d.ang<=15?'#065f46':'#dc2626'};font-weight:700;">${d.ang<=15?'✓ Yes':'✗ No'}</td>
        </tr>`).join('')}
      </tbody>
    </table>
    <p style="margin-top:8px;">As θ increases beyond 15°, T² increases and g decreases, confirming that valid SHM only occurs for small amplitudes.</p>

    <h3>11.4 Educational Pedagogies</h3>
    <p><strong>Constructivism (Piaget, 1952; Vygotsky, 1978):</strong> The application requires students to actively construct understanding by entering real experimental data, manipulating the gradient triangle, and interpreting the uncertainty verdict — rather than passively observing a pre-run simulation. The staged workflow scaffolds progression through the zone of proximal development.</p>
    <p><strong>Cognitive Load Theory (Sweller, 1988):</strong> Five separate tabs (Image Extract → Data Table → Graph → Extension → Analysis) partition the total task into discrete cognitive phases, preventing extraneous load from competing processes. Students complete one phase before advancing to the next.</p>
    <p><strong>Retrieval Practice (Roediger &amp; Karpicke, 2006):</strong> Each phase requires students to recall and apply procedural knowledge — identifying anomalies, choosing axis scales, positioning the triangle — creating low-stakes retrieval events that strengthen long-term retention.</p>
    <p><strong>Formative Feedback (Hattie &amp; Timperley, 2007):</strong> The real-time CONSISTENT/INCONSISTENT verdict provides immediate, criterion-referenced feedback at the point of learning. Students can adjust their gradient triangle and instantly see the effect on their g value and uncertainty, supporting iterative self-correction.</p>
    <p><strong>Differentiation:</strong> The extension tab (large-angle investigation) provides stretch for high-attaining students whilst the core experiment is self-contained for standard progression. The image extraction feature reduces barriers for students with handwriting difficulties or those working at pace.</p>
